<!-- left_panel.html -->
<div class="left-nav" aria-label="Main navigation">
    <div class="left-nav-header">
        <img src="/static/img/logo.png" alt="Logo" style="height:160px;width:160px;object-fit:contain;" />
    </div>
    <ul class="left-nav-list">

        <li class="left-nav-item">
            <a href="/dashboard" class="left-nav-link {% if active_section == 'dashboard' %}active{% endif %}">
                <svg class="left-nav-icon" width="40" height="40" fill="none" stroke="#1976d2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="36" height="28" rx="2"/><path d="M6 16h36"/><path d="M16 6v28"/></svg>
                Dashboard
            </a>
        </li>
        <li class="left-nav-item">
            <a href="/rules/transaction_rules" class="left-nav-link {% if active_section == 'rules' %}active{% endif %}">
                <svg class="left-nav-icon" width="40" height="40" fill="none" stroke="#1976d2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="14" width="28" height="20" rx="2"/><path d="M32 14V10a2 2 0 0 0-2-2H12a2 2 0 0 0-2 2v4"/></svg>
                Entries
            </a>
        </li>
        <li class="left-nav-item">
            <a href="/event" class="left-nav-link {% if active_section == 'event' %}active{% endif %}">
                <svg class="left-nav-icon" width="40" height="40" fill="none" stroke="#1976d2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="20" cy="20" r="16"/><path d="M20 8v12l8 4"/></svg>
                Account
            </a>
        </li>
    </ul>
    
    <footer style="position: fixed; left: 0; bottom: 0; padding: 8px 16px; font-size: 0.9em; color: #888; background: none; z-index: 100;">
        Version: {{ version }} <br>
        Commit: {{ git_commit }}
    </footer>
</div>
