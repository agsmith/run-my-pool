<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Run My Pool</title>
        <link rel="stylesheet" href="/static/css/left-nav.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/rmp.js"></script>
</head>
<body>
    {% include 'left_panel.html' %}
    {% include 'header.html' %}
        <div class="main-content-with-nav">
        <div class="container" style="height: auto; overflow:auto;">
                <div class="permission-error-banner">
                    <h2>{{ username }}'s Leagues</h2>
                        <div id="league-results">
                        {% if leagues %}
                            <div style="margin-top:24px; display:flex; gap:16px; flex-wrap:wrap;">
                            {% for league in leagues %}
                                <form action="/entries" method="get" style="display:inline;">
                                    <button type="submit" style="padding:12px 32px; font-size:1.1em; background:#e3e3e3; border-radius:8px; border:none; cursor:pointer;">
                                        {{ league.league_name }}
                                    </button>
                                </form>
                            {% endfor %}
                            </div>
                        {% else %}
                            <p>No leagues found for this user.</p>
                        {% endif %}
                        </div>


                </div>
        </div>

        <div class="container" style="height: auto; overflow:auto;">
                <div class="permission-error-banner" style="height:auto; overflow:auto;">
                    <h2>League Search</h2>
                        <div id="league-search-bar" style="margin-bottom:24px; display:flex; gap:12px; align-items:center;">
                            <input type="text" id="league-search-input" placeholder="Search by League Name or ID" style="padding:8px 16px; font-size:1em; border-radius:8px; border:1px solid #ccc;">
                            <button id="league-search-btn" style="padding:8px 24px; font-size:1em; background:#3498db; color:#fff; border-radius:8px; border:none; cursor:pointer;">Search</button>
                        </div>
                </div>
        </div>
        </div>

</body>
</html>
