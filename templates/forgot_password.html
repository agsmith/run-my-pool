{% extends "header.html" %}
{% block content %}
<div class="forgot-password-container">
    <h2>Forgot Password</h2>
    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}
    {% if message %}
        <div class="success-message">{{ message }}</div>
    {% endif %}
    <form method="post" action="/forgot-password">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>
        <button type="submit">Send Reset Link</button>
    </form>
    <div style="margin-top:24px; text-align:center;">
        <a href="/login">Back to Login</a>
    </div>
</div>
<style>
.forgot-password-container {
    max-width: 400px;
    margin: 40px auto;
    padding: 24px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.forgot-password-container h2 {
    text-align: center;
    margin-bottom: 24px;
}
.form-group {
    margin-bottom: 16px;
}
.form-group label {
    display: block;
    margin-bottom: 6px;
}
.form-group input {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
}
.error-message {
    color: #b00;
    background: #fee;
    padding: 8px;
    border-radius: 4px;
    margin-bottom: 16px;
    text-align: center;
}
.success-message {
    color: #080;
    background: #efe;
    padding: 8px;
    border-radius: 4px;
    margin-bottom: 16px;
    text-align: center;
}
</style>
{% endblock %}
