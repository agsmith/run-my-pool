<div class="login-container">
    <h2>Login</h2>
    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Login</button>
    </form>
    <div style="text-align:center; margin-top:18px;">
        <a href="/create-user" class="create-user-link">Create a new user</a>
    </div>
    <div style="margin-top:24px; text-align:center;">
        <a href="/forgot-password">Forgot Password?</a>
        <a href="/login" style="margin-left:16px;">Back to Login</a>
    </div>
    <div class="login-meta">
        <p>Version: {{ version }} | Commit: {{ git_commit }} | Environment: {{ environment }}</p>
    </div>
</div>
<style>
    .login-container {
        max-width: 400px;
        margin: 40px auto;
        padding: 24px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .login-container h2 {
        text-align: center;
        margin-bottom: 24px;
    }
    .form-group {
        margin-bottom: 16px;
    }
    .form-group label {
        display: block;
        margin-bottom: 6px;
    }
    .form-group input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    .error-message {
        color: #b00;
        background: #fee;
        padding: 8px;
        border-radius: 4px;
        margin-bottom: 16px;
        text-align: center;
    }
    .login-meta {
        margin-top: 24px;
        font-size: 0.9em;
        color: #888;
        text-align: center;
    }
</style>
