<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Run My Pool</title>
    <link rel="stylesheet" href="static/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        
        .logo-section {
            margin-bottom: 32px;
        }
        
        .logo-section img {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
        }
        
        .logo-section h1 {
            margin: 0 0 8px 0;
            color: #333;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .logo-section p {
            margin: 0;
            color: #666;
            font-size: 16px;
            font-weight: 400;
        }
        
        .login-form h2 {
            margin: 0 0 24px 0;
            color: #333;
            font-size: 24px;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #fee;
            color: #d32f2f;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #d32f2f;
            text-align: left;
            font-size: 14px;
        }
        
        .links-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e1e5e9;
        }
        
        .links-section a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            margin: 0 8px;
            transition: color 0.3s ease;
        }
        
        .links-section a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .support-section {
            margin-top: 20px;
            padding: 16px;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 8px;
            font-size: 14px;
            color: #666;
        }
        
        .support-section a {
            color: #667eea;
            font-weight: 500;
        }
        
        .footer-info {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="static/img/logo_simple.svg" alt="Run My Pool Logo" />
            <h1>Run My Pool</h1>
            <p>Football Survivor Pool</p>
        </div>
        
        <div class="login-form">
            <h2>Welcome Back</h2>
            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}
            <form method="post" action="/login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            
            <div class="links-section">
                <a href="/create-user">Create Account</a>
                <a href="/forgot-password">Forgot Password?</a>
            </div>
            
            <div class="support-section">
                Need help with your account?<br>
                <a href="mailto:support@runmypool.com">Contact Support</a>
            </div>
        </div>
    </div>
    
    <div class="footer-info">
        © 2025 Run My Pool. All rights reserved.
    </div>
</body>
</html>
