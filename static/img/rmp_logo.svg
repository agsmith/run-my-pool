<!-- Run My Pool Logo - Alternative version -->
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Purple gradient circle to match theme -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B68EE;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle with gradient background -->
  <circle cx="60" cy="60" r="50" fill="url(#logoGradient)"/>
  
  <!-- White RMP text -->
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#ffffff" text-anchor="middle" dominant-baseline="middle">RMP</text>
</svg>
